name: build_kernel_ksu_susfs
on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  KERNEL_BRANCH: android-msm-redbull-4.19-android14-qpr1
  SUBLEVEL: "278"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git wget curl zip cpio bc bison build-essential flex libncurses-dev libssl-dev

      - name: Cache kernel source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: android-kernel
          key: kernel-${{ env.KERNEL_BRANCH }}-v2
          restore-keys: |
            kernel-${{ env.KERNEL_BRANCH }}-

      - name: Sync kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
          repo sync -c --no-tags -j$(nproc)

      - name: Verify cached source
        if: steps.cache-kernel.outputs.cache-hit == 'true'
        run: |
          echo "=== Cache hit! Skipping repo sync ==="
          ls -la android-kernel/private/msm-google/Makefile 2>/dev/null || {
            echo "Cache invalid, re-syncing..."
            rm -rf android-kernel
            mkdir android-kernel && cd android-kernel
            repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
            repo sync -c --no-tags -j$(nproc)
          }

      - name: Modify SUBLEVEL
        run: |
          cd android-kernel/private/msm-google
          # Clean previous build artifacts and KSU-Next from cache
          rm -rf out/ AnyKernel3/ KernelSU-Next/ drivers/kernelsu/
          sed -i 's/SUBLEVEL = .*/SUBLEVEL = ${{ env.SUBLEVEL }}/' Makefile
          grep SUBLEVEL Makefile

      - name: Setup KernelSU-Next with SUSFS (manual clone from wshamroukh fork)
        run: |
          cd android-kernel/private/msm-google
          # setup.sh hardcodes KernelSU-Next/KernelSU-Next repo, but we need wshamroukh fork
          # So we do manual clone + symlink (same as JackA1ltman's "manual" method)
          
          KSU_REPO="https://github.com/wshamroukh/KernelSU-Next-SUSFS-kernelv4.19"
          KSU_BRANCH="legacy-susfs"
          KSU_NAME="KernelSU-Next"
          
          git clone "$KSU_REPO" -b "$KSU_BRANCH" "$KSU_NAME" --depth=1
          ln -sf "$(realpath --relative-to=drivers "$KSU_NAME/kernel")" drivers/kernelsu
          
          # Add to drivers/Makefile
          grep -q "kernelsu" drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          
          # Add to drivers/Kconfig
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          
          echo "=== KernelSU-Next + SUSFS setup complete ==="
          echo "=== KSU branch ==="
          cd KernelSU-Next && git branch && cd ..
          echo "=== Checking SUSFS in Kconfig ==="
          grep -c "KSU_SUSFS" drivers/kernelsu/Kconfig || echo "SUSFS not found in Kconfig!"
          echo "=== Checking KSU_SUSFS config ==="
          grep "KSU_SUSFS" drivers/kernelsu/Kconfig | head -5 || true

      - name: Disable kprobe in KernelSU-Next (force manual hook)
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next/kernel
          # Replace all #ifdef CONFIG_KPROBES with disabled version
          find . -type f \( -name '*.c' -o -name '*.h' \) -exec sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +
          echo "=== kprobe disabled ==="
          grep -r "CONFIG_KPROBES" . | head -10

      - name: SUSFS patches (NOT NEEDED - using legacy-susfs branch)
        shell: bash
        run: |
          echo "=== SUSFS already integrated in legacy-susfs branch, no patches needed ==="
          # Just need to copy susfs.c and susfs_def.h to kernel source
          # The 50_add_susfs_in_kernel-4.19.patch is still needed for kernel-side hooks
          KSU_ROOT=/home/runner/work/pixel5-kernel-build/pixel5-kernel-build/android-kernel
          cd $KSU_ROOT/private/msm-google
          
          # Clone JackA1ltman for kernel-side SUSFS patch (50_add_susfs_in_kernel-4.19.patch)
          cd $KSU_ROOT
          rm -rf susfs4ksu manipvlator-kernel miz-kernel
          git clone https://github.com/JackA1ltman/susfs_4.19_lastest_sussu.git susfs4ksu || true
          
          # Clone MizProject for SUSFS v2.0.0 source files (4.19 kernel, NO fsnotify, supercall ABI)
          # MizProject is 4.19.162 kernel with SUSFS v2.0.0 - perfect match for our 4.19.278
          git clone --depth=1 https://github.com/MizProject/MizKernel-Galaxy-A12s-Refresh miz-kernel || true
          
          cd $KSU_ROOT/private/msm-google
          # Use v2.0.0 source files from MizProject (4.19 native, no fsnotify issues)
          cp -v $KSU_ROOT/miz-kernel/include/linux/susfs.h include/linux/ 2>/dev/null || true
          cp -v $KSU_ROOT/miz-kernel/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          cp -v $KSU_ROOT/miz-kernel/fs/susfs.c fs/ 2>/dev/null || true
          
          # Copy susfs_backports.h (provides 4.19-specific implementations)
          cp -v $KSU_ROOT/miz-kernel/include/linux/susfs_backports.h include/linux/ 2>/dev/null || true
          # Include susfs_backports.h at end of susfs.c
          echo '#include <linux/susfs_backports.h>' >> fs/susfs.c
          
          # Copy sus_su from JackA1ltman (not in MizProject)
          cp -v $KSU_ROOT/susfs4ksu/kernel_patches/include/linux/sus_su.h include/linux/ 2>/dev/null || true
          cp -v $KSU_ROOT/susfs4ksu/kernel_patches/fs/sus_su.c fs/ 2>/dev/null || true
          
          # Add v2.0.0 compatibility shims for wshamroukh legacy-susfs
          bash ../../../patches/susfs_v2_compat.sh
          echo "=== SUSFS v2.0.0 compatibility patches applied ==="
          
          # Verify susfs files
          echo "=== Checking SUSFS files ==="
          ls -la include/linux/susfs.h include/linux/susfs_def.h fs/susfs.c 2>&1
          echo "=== SUSFS_VERSION ==="
          grep "SUSFS_VERSION" include/linux/susfs.h || echo "NOT in susfs.h!"
          echo "=== SUSFS_MAGIC ==="
          grep "SUSFS_MAGIC" include/linux/susfs_def.h || echo "NOT in susfs_def.h!"
          
          # Apply kernel-side SUSFS patch (modifies fs/namespace.c, fs/namei.c, etc.)
          cp $KSU_ROOT/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch . 2>/dev/null || true
          patch -p1 --batch --no-backup-if-mismatch < 50_add_susfs_in_kernel-4.19.patch || true
          echo "=== Kernel-side SUSFS patches applied ==="

      - name: Apply manual hooks (JackA1ltman's normal_patches.sh)
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          cp ../../../patches/normal_patches.sh .
          chmod +x normal_patches.sh
          bash normal_patches.sh
          python3 ../../../patches/patch_reboot.py kernel/reboot.c
          echo "=== Manual hooks applied ==="
          grep -n 'ksu_handle' fs/exec.c | head -5
          grep -n 'ksu_handle' fs/open.c | head -5
          grep -n 'ksu_handle' fs/read_write.c | head -5
          grep -n 'ksu_handle' fs/stat.c | head -5
          grep -n 'ksu_handle_sys_reboot' kernel/reboot.c | head -3

      - name: Inject KSU + SUSFS config into build.config
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          
          CONFIG_FILE="build.config.redbull.vintf"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: $CONFIG_FILE not found!"
            find . -name "build.config.redbull*" 2>/dev/null
            exit 1
          fi
          
          echo "=== Original update_config function ==="
          grep -A 15 "function update_config" "$CONFIG_FILE"
          
          # Use Python to inject config options AFTER olddefconfig
          python3 << 'PYEOF'
          with open('build.config.redbull.vintf', 'r') as f:
              content = f.read()
          
          # We need to inject scripts/config AFTER olddefconfig, not before it
          # The olddefconfig line looks like:
          #   make O=${OUT_DIR} ... olddefconfig)
          # We add our scripts/config call after the closing paren of olddefconfig
          
          inject = """
              # KSU + SUSFS config injection (after olddefconfig)
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config \\
              -e KSU \\
              -e KSU_MANUAL_HOOK \\
              -e KSU_SUSFS \\
              -e KSU_SUSFS_SUS_PATH \\
              -e KSU_SUSFS_SUS_MOUNT \\
              -e KSU_SUSFS_SUS_KSTAT \\
              -e KSU_SUSFS_TRY_UMOUNT \\
              -e KSU_SUSFS_SPOOF_UNAME \\
              -e KSU_SUSFS_ENABLE_LOG \\
              -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \\
              -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \\
              -e KSU_SUSFS_OPEN_REDIRECT \\
              -e KSU_SUSFS_SUS_MAP
              # Run olddefconfig again to resolve dependencies
              (cd ${OUT_DIR} && \\
              make O=${OUT_DIR} CLANG_TRIPLE=${CLANG_TRIPLE} CROSS_COMPILE=${CROSS_COMPILE} "${TOOL_ARGS[@]}" ${MAKE_ARGS} olddefconfig)
          """
          
          # Find the olddefconfig line and inject after the closing parenthesis
          # The pattern is: olddefconfig)\n}
          content = content.replace(
              'olddefconfig)\n}',
              'olddefconfig)\n' + inject + '\n}'
          )
          
          with open('build.config.redbull.vintf', 'w') as f:
              f.write(content)
          
          print("=== Config injected successfully (AFTER olddefconfig) ===")
          PYEOF
          
          echo "=== Modified update_config function ==="
          grep -A 40 "function update_config" "$CONFIG_FILE"

      - name: Patch KSU Kbuild to skip hook check during mrproper
        run: |
          cd android-kernel/private/msm-google
          # The Kbuild checks for hooks during mrproper/clean when .config doesn't exist yet
          # Patch out the $(error) so build can proceed
          KSU_KBUILD="drivers/kernelsu/Kbuild"
          if [ -f "$KSU_KBUILD" ]; then
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$KSU_KBUILD"
            echo "=== Patched Kbuild to skip error ==="
            grep "No hooks" "$KSU_KBUILD" || echo "Error line removed successfully"
          else
            # It's a symlink, patch the real file
            REAL_KBUILD=$(readlink -f "$KSU_KBUILD")
            echo "Real Kbuild at: $REAL_KBUILD"
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$REAL_KBUILD"
            echo "=== Patched real Kbuild ==="
          fi

      - name: Build kernel
        run: |
          cd android-kernel
          # Clean previous build output to avoid cache issues
          rm -rf out/ AnyKernel3/
          LTO=thin ./private/msm-google/build_redbull-gki.sh

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la android-kernel/out/android-msm-pixel-4.19/dist/ 2>/dev/null || echo "dist not found, checking out/"
          find android-kernel/out/ -name "Image.lz4-dtb" 2>/dev/null
          find android-kernel/out/ -name "*.ko" 2>/dev/null | head -10
          find android-kernel/out/ -name "boot.img" 2>/dev/null

      - name: Setup AnyKernel3
        run: |
          cd android-kernel
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          # Configure AnyKernel3 for Pixel 5 (2SI, A/B slot, with modules)
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
          sed -i 's/do.modules=0/do.modules=1/g' AnyKernel3/anykernel.sh
          sed -i 's/do.systemless=1/do.systemless=0/g' AnyKernel3/anykernel.sh
          
          # Copy kernel image
          cp out/android-msm-pixel-4.19/dist/Image.lz4-dtb AnyKernel3/
          
          # Copy kernel modules to proper location for AnyKernel3
          # do.modules=1 expects modules in $home/modules/lib/modules/
          mkdir -p AnyKernel3/modules/lib/modules
          find out/android-msm-pixel-4.19/dist/ -name "*.ko" -exec cp {} AnyKernel3/modules/lib/modules/ \;
          
          # Copy modules.load and modules.dep if they exist
          cp out/android-msm-pixel-4.19/dist/modules.load AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.dep AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.alias AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          
          # List modules
          echo "=== Modules to install ==="
          ls -la AnyKernel3/modules/lib/modules/ | head -20
          echo "=== Module count ==="
          find AnyKernel3/modules/ -name "*.ko" | wc -l
          
          # Also copy vendor_boot.img and dtbo.img for manual flashing
          cp out/android-msm-pixel-4.19/dist/vendor_boot.img AnyKernel3/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/dtbo.img AnyKernel3/ 2>/dev/null || true
          
          cd AnyKernel3
          zip -r9 ../redfin-ksu-susfs-kernel.zip ./*
          
          echo "=== AnyKernel3 zip created ==="
          ls -la ../redfin-ksu-susfs-kernel.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: redfin-ksu-susfs-kernel
          path: android-kernel/redfin-ksu-susfs-kernel.zip

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/boot.img

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor_boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/vendor_boot.img

      - name: Upload dtbo.img
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/dtbo.img

      - name: Upload kernel modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: android-kernel/out/android-msm-pixel-4.19/dist/*.ko
          if-no-files-found: warn
