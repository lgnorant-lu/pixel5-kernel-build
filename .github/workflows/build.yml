name: build_kernel_ksu_susfs
on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  KERNEL_BRANCH: android-msm-redbull-4.19-android14-qpr1
  SUBLEVEL: "278"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git wget curl zip cpio bc bison build-essential flex libncurses-dev libssl-dev

      - name: Sync kernel source
        run: |
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
          repo sync -c --no-tags -j$(nproc)

      - name: Modify SUBLEVEL
        run: |
          cd android-kernel/private/msm-google
          sed -i 's/SUBLEVEL = .*/SUBLEVEL = ${{ env.SUBLEVEL }}/' Makefile
          grep SUBLEVEL Makefile

      - name: Setup KernelSU-Next with SUSFS (legacy/non-GKI 4.19)
        run: |
          cd android-kernel/private/msm-google
          # Use wshamroukh's fork which has SUSFS v2.0.0+ integrated for 4.19 kernel
          curl -LSs "https://raw.githubusercontent.com/wshamroukh/KernelSU-Next-SUSFS-kernelv4.19/legacy/kernel/setup.sh" | bash -s legacy
          echo "=== KernelSU-Next + SUSFS setup complete ==="
          ls -la drivers/kernelsu/
          echo "=== Checking SUSFS config ==="
          grep -c "KSU_SUSFS" drivers/kernelsu/Kconfig || echo "SUSFS not found in Kconfig!"
          echo "=== Checking susfs.c ==="
          ls -la fs/susfs.c 2>/dev/null || echo "susfs.c not found (will be added by SUSFS patch)"

      - name: Disable kprobe in KernelSU-Next (force manual hook)
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next/kernel
          # Replace all #ifdef CONFIG_KPROBES with disabled version
          find . -type f \( -name '*.c' -o -name '*.h' \) -exec sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +
          echo "=== kprobe disabled ==="
          grep -r "CONFIG_KPROBES" . | head -10

      - name: Clone SUSFS kernel patches (for fs/susfs.c and kernel patches)
        run: |
          cd android-kernel
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs4ksu || true
          echo "=== SUSFS patches cloned ==="
          find susfs4ksu/kernel_patches/ -type f 2>/dev/null || echo "No patches found"

      - name: Copy SUSFS source files and apply patches
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          KSU_ROOT=/home/runner/work/pixel5-kernel-build/pixel5-kernel-build/android-kernel
          
          # Copy susfs.c and susfs.h (these are the SUSFS implementation files)
          cp $KSU_ROOT/susfs4ksu/kernel_patches/fs/susfs.c fs/ 2>/dev/null || echo "susfs.c copy skipped"
          cp $KSU_ROOT/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/ 2>/dev/null || echo "susfs.h copy skipped"
          
          # Apply kernel patch (modifies fs/namespace.c, fs/namei.c, etc.)
          # Note: wshamroukh fork already has SUSFS in KSU's Kconfig/Kbuild
          # We only need the kernel-side patches from susfs4ksu
          cp $KSU_ROOT/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch . 2>/dev/null || true
          patch -p1 --batch --no-backup-if-mismatch < 50_add_susfs_in_kernel-4.19.patch || true
          echo "=== SUSFS kernel patches applied ==="

      - name: Apply SUSFS KSU-Next patch
        shell: bash
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next
          KSU_ROOT=/home/runner/work/pixel5-kernel-build/pixel5-kernel-build/android-kernel
          # Try the patch from susfs4ksu - may partially fail on KSU-Next but that's OK
          # wshamroukh fork already has SUSFS integration in its code
          cp $KSU_ROOT/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch . 2>/dev/null || true
          patch -p1 --batch --no-backup-if-mismatch < 10_enable_susfs_for_ksu.patch || true
          echo "=== SUSFS KSU patch applied ==="

      - name: Apply manual hooks (file replacement + reboot.c patch)
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          
          # Use CZB666's pre-modified files (correct hook placement for redbull 4.19)
          cp ../../../patches/exec.c fs/exec.c
          cp ../../../patches/open.c fs/open.c
          cp ../../../patches/read_write.c fs/read_write.c
          cp ../../../patches/stat.c fs/stat.c
          
          echo "=== File replacement done ==="
          grep -c 'ksu_handle' fs/exec.c fs/open.c fs/read_write.c fs/stat.c
          
          # For kernel/reboot.c - use Python script for proper hook insertion
          python3 ../../../patches/patch_reboot.py kernel/reboot.c
          
          # Verify all hooks
          echo "=== Verification ==="
          echo "--- reboot.c ---"
          grep -n 'ksu_handle_sys_reboot' kernel/reboot.c || echo "FAILED!"
          echo "--- exec.c ---"
          grep -n 'ksu_handle_execveat' fs/exec.c | head -3
          echo "--- open.c ---"
          grep -n 'ksu_handle_faccessat' fs/open.c | head -3
          echo "--- read_write.c ---"
          grep -n 'ksu_handle_vfs_read' fs/read_write.c | head -3
          echo "--- stat.c ---"
          grep -n 'ksu_handle_stat' fs/stat.c | head -3

      - name: Add KSU + SUSFS config fragment
        run: |
          cd android-kernel/private/msm-google
          
          # Create a config fragment that will be appended
          cat > ksu_susfs.fragment << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          
          # Merge fragment into the build config
          # build_redbull-gki.sh uses arch/arm64/configs/vendor/redbull_GKI.config
          CONFIG_FILE="arch/arm64/configs/vendor/redbull_GKI.config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "" >> "$CONFIG_FILE"
            cat ksu_susfs.fragment >> "$CONFIG_FILE"
            echo "=== Config merged into $CONFIG_FILE ==="
            tail -20 "$CONFIG_FILE"
          else
            echo "WARNING: $CONFIG_FILE not found, searching for defconfig..."
            find arch/arm64/configs -name "*redbull*" -o -name "*redfin*" | head -10
            # Try to find the main config
            find . -name "build_redbull-gki.sh" -exec cat {} \; | grep -i "config\|defconfig" | head -10
          fi

      - name: Patch KSU Kbuild to skip hook check during mrproper
        run: |
          cd android-kernel/private/msm-google
          # The Kbuild checks for hooks during mrproper/clean when .config doesn't exist yet
          # Patch out the $(error) so build can proceed
          KSU_KBUILD="drivers/kernelsu/Kbuild"
          if [ -f "$KSU_KBUILD" ]; then
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$KSU_KBUILD"
            echo "=== Patched Kbuild to skip error ==="
            grep "No hooks" "$KSU_KBUILD" || echo "Error line removed successfully"
          else
            # It's a symlink, patch the real file
            REAL_KBUILD=$(readlink -f "$KSU_KBUILD")
            echo "Real Kbuild at: $REAL_KBUILD"
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$REAL_KBUILD"
            echo "=== Patched real Kbuild ==="
          fi

      - name: Build kernel
        run: |
          cd android-kernel
          LTO=thin ./private/msm-google/build_redbull-gki.sh

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la android-kernel/out/android-msm-pixel-4.19/dist/ 2>/dev/null || echo "dist not found, checking out/"
          find android-kernel/out/ -name "Image.lz4-dtb" 2>/dev/null
          find android-kernel/out/ -name "*.ko" 2>/dev/null | head -10
          find android-kernel/out/ -name "boot.img" 2>/dev/null

      - name: Setup AnyKernel3
        run: |
          cd android-kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          # Configure AnyKernel3 for Pixel 5 (2SI, A/B slot, with modules)
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
          sed -i 's/do.modules=0/do.modules=1/g' AnyKernel3/anykernel.sh
          sed -i 's/do.systemless=1/do.systemless=0/g' AnyKernel3/anykernel.sh
          
          # Copy kernel image
          cp out/android-msm-pixel-4.19/dist/Image.lz4-dtb AnyKernel3/
          
          # Copy kernel modules to proper location for AnyKernel3
          # do.modules=1 expects modules in $home/modules/lib/modules/
          mkdir -p AnyKernel3/modules/lib/modules
          find out/android-msm-pixel-4.19/dist/ -name "*.ko" -exec cp {} AnyKernel3/modules/lib/modules/ \;
          
          # Copy modules.load and modules.dep if they exist
          cp out/android-msm-pixel-4.19/dist/modules.load AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.dep AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.alias AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          
          # List modules
          echo "=== Modules to install ==="
          ls -la AnyKernel3/modules/lib/modules/ | head -20
          echo "=== Module count ==="
          find AnyKernel3/modules/ -name "*.ko" | wc -l
          
          # Also copy vendor_boot.img and dtbo.img for manual flashing
          cp out/android-msm-pixel-4.19/dist/vendor_boot.img AnyKernel3/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/dtbo.img AnyKernel3/ 2>/dev/null || true
          
          cd AnyKernel3
          zip -r9 ../redfin-ksu-susfs-kernel.zip ./*
          
          echo "=== AnyKernel3 zip created ==="
          ls -la ../redfin-ksu-susfs-kernel.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: redfin-ksu-susfs-kernel
          path: android-kernel/redfin-ksu-susfs-kernel.zip

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/boot.img

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor_boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/vendor_boot.img

      - name: Upload dtbo.img
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/dtbo.img

      - name: Upload kernel modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: android-kernel/out/android-msm-pixel-4.19/dist/*.ko
          if-no-files-found: warn
