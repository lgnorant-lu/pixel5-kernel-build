name: build_kernel_ksu_susfs
on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  KERNEL_BRANCH: android-msm-redbull-4.19-android14-qpr1
  SUBLEVEL: "278"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git wget curl zip cpio bc bison build-essential flex libncurses-dev libssl-dev

      - name: Sync kernel source
        run: |
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
          repo sync -c --no-tags -j$(nproc)

      - name: Modify SUBLEVEL
        run: |
          cd android-kernel/private/msm-google
          sed -i 's/SUBLEVEL = .*/SUBLEVEL = ${{ env.SUBLEVEL }}/' Makefile
          grep SUBLEVEL Makefile

      - name: Setup KernelSU-Next (legacy/non-GKI)
        run: |
          cd android-kernel/private/msm-google
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          echo "=== KernelSU-Next setup complete ==="
          ls -la drivers/kernelsu/
          ls -la KernelSU-Next/kernel/ | head -20

      - name: Disable kprobe in KernelSU-Next (force manual hook)
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next/kernel
          # Replace all #ifdef CONFIG_KPROBES with disabled version
          find . -type f \( -name '*.c' -o -name '*.h' \) -exec sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +
          echo "=== kprobe disabled ==="
          grep -r "CONFIG_KPROBES" . | head -10

      - name: Clone SUSFS patches
        run: |
          cd android-kernel
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs4ksu
          echo "=== SUSFS files ==="
          find susfs4ksu/kernel_patches/ -type f

      - name: Copy SUSFS source files
        run: |
          cd android-kernel
          KERNEL_ROOT=private/msm-google
          cp susfs4ksu/kernel_patches/fs/* $KERNEL_ROOT/fs/
          cp susfs4ksu/kernel_patches/include/linux/* $KERNEL_ROOT/include/linux/
          echo "=== SUSFS files copied ==="
          ls -la $KERNEL_ROOT/fs/susfs.c $KERNEL_ROOT/include/linux/susfs.h

      - name: Apply SUSFS KSU patch
        shell: bash
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next
          KSU_ROOT=/home/runner/work/pixel5-kernel-build/pixel5-kernel-build/android-kernel
          cp $KSU_ROOT/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch .
          patch -p1 --batch --no-backup-if-mismatch < 10_enable_susfs_for_ksu.patch || true
          echo "=== KSU SUSFS patch applied (some hunks may fail, expected) ==="

      - name: Apply SUSFS kernel patch
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          KSU_ROOT=/home/runner/work/pixel5-kernel-build/pixel5-kernel-build/android-kernel
          cp $KSU_ROOT/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch .
          patch -p1 --batch --no-backup-if-mismatch < 50_add_susfs_in_kernel-4.19.patch || true
          echo "=== Kernel SUSFS patch applied (some hunks may fail, expected) ==="

      - name: Apply manual hooks to kernel source
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          
          # fs/exec.c - add hook to do_execveat_common
          sed -i '/^static int do_execveat_common/i #ifdef CONFIG_KSU' fs/exec.c
          sed -i '/^static int do_execveat_common/a #endif' fs/exec.c
          sed -i 's/return __do_execve_file(fd, filename, argv, envp, flags, NULL);/\n#ifdef CONFIG_KSU\n\tksu_handle_execveat(\&fd, \&filename, \&argv, \&envp, \&flags);\n#endif\n\treturn __do_execve_file(fd, filename, argv, envp, flags, NULL);/' fs/exec.c
          # Add extern declaration
          grep -q 'ksu_handle_execveat' fs/exec.c || sed -i '/^#include/i extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);' fs/exec.c
          
          # fs/open.c - add hook to do_faccessat
          sed -i '/^SYSCALL_DEFINE3(faccessat/i #ifdef CONFIG_KSU\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif' fs/open.c
          sed -i '/unsigned int lookup_flags = LOOKUP_FOLLOW;/a #ifdef CONFIG_KSU\n\tksu_handle_faccessat(\&dfd, \&filename, \&mode, NULL);\n#endif' fs/open.c || true
          
          # fs/read_write.c - add hook to vfs_read
          sed -i '/^ssize_t vfs_read/i #ifdef CONFIG_KSU\nextern bool ksu_vfs_read_hook __read_mostly;\nextern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr, size_t *count_ptr, loff_t **pos);\n#endif' fs/read_write.c
          sed -i '0,/ssize_t ret;$/{s/ssize_t ret;/ssize_t ret;\n#ifdef CONFIG_KSU\n\tif (unlikely(ksu_vfs_read_hook))\n\t\tksu_handle_vfs_read(\&file, \&buf, \&count, \&pos);\n#endif/}' fs/read_write.c || true
          
          # fs/stat.c - add hook to vfs_statx
          sed -i '/^int vfs_statx/i #ifdef CONFIG_KSU\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);\n#endif' fs/stat.c
          sed -i '/unsigned int lookup_flags = LOOKUP_FOLLOW | LOOKUP_AUTOMOUNT;/a #ifdef CONFIG_KSU\n\tksu_handle_stat(\&dfd, \&filename, \&flags);\n#endif' fs/stat.c || true
          
          # kernel/reboot.c - add hook to reboot syscall
          sed -i '/^SYSCALL_DEFINE4(reboot/i #ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif' kernel/reboot.c
          sed -i '/char buffer\[256\];/a #ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, \&arg);\n#endif' kernel/reboot.c || true
          
          # CRITICAL: Verify ksu_handle_sys_reboot is in reboot.c (KSU Kbuild checks this)
          if ! grep -q 'ksu_handle_sys_reboot' kernel/reboot.c; then
            echo "WARNING: ksu_handle_sys_reboot not found in reboot.c, force injecting..."
            # Find SYSCALL_DEFINE4(reboot and inject after the opening brace
            sed -i '/SYSCALL_DEFINE4(reboot/,/{/{
              /{/a\#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, \&arg);\n#endif
            }' kernel/reboot.c || true
          fi
          
          # Also try alternative: inject near do_kernel_restart
          if ! grep -q 'ksu_handle_sys_reboot' kernel/reboot.c; then
            echo "WARNING: Still not found, trying brute force injection..."
            # Add extern and call at top of file after includes
            sed -i '/^#include/a #ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif' kernel/reboot.c
            # Add call inside reboot syscall
            sed -i '/struct pid_namespace \*pid_ns/i #ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, \&arg);\n#endif' kernel/reboot.c || true
          fi
          
          echo "=== Manual hooks applied ==="
          echo "--- reboot.c hook check (CRITICAL) ---"
          grep -n 'ksu_handle_sys_reboot' kernel/reboot.c || echo "FAILED: ksu_handle_sys_reboot NOT in reboot.c!"
          echo "--- exec.c hook check ---"
          grep -n 'ksu_handle' fs/exec.c | head -5
          echo "--- open.c hook check ---"
          grep -n 'ksu_handle' fs/open.c | head -5
          echo "--- read_write.c hook check ---"
          grep -n 'ksu_handle' fs/read_write.c | head -5

      - name: Add KSU + SUSFS config fragment
        run: |
          cd android-kernel/private/msm-google
          
          # Create a config fragment that will be appended
          cat > ksu_susfs.fragment << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          
          # Merge fragment into the build config
          # build_redbull-gki.sh uses arch/arm64/configs/vendor/redbull_GKI.config
          CONFIG_FILE="arch/arm64/configs/vendor/redbull_GKI.config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "" >> "$CONFIG_FILE"
            cat ksu_susfs.fragment >> "$CONFIG_FILE"
            echo "=== Config merged into $CONFIG_FILE ==="
            tail -20 "$CONFIG_FILE"
          else
            echo "WARNING: $CONFIG_FILE not found, searching for defconfig..."
            find arch/arm64/configs -name "*redbull*" -o -name "*redfin*" | head -10
            # Try to find the main config
            find . -name "build_redbull-gki.sh" -exec cat {} \; | grep -i "config\|defconfig" | head -10
          fi

      - name: Patch KSU Kbuild to skip hook check during mrproper
        run: |
          cd android-kernel/private/msm-google
          # The Kbuild checks for hooks during mrproper/clean when .config doesn't exist yet
          # Patch out the $(error) so build can proceed
          KSU_KBUILD="drivers/kernelsu/Kbuild"
          if [ -f "$KSU_KBUILD" ]; then
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$KSU_KBUILD"
            echo "=== Patched Kbuild to skip error ==="
            grep "No hooks" "$KSU_KBUILD" || echo "Error line removed successfully"
          else
            # It's a symlink, patch the real file
            REAL_KBUILD=$(readlink -f "$KSU_KBUILD")
            echo "Real Kbuild at: $REAL_KBUILD"
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$REAL_KBUILD"
            echo "=== Patched real Kbuild ==="
          fi

      - name: Build kernel
        run: |
          cd android-kernel
          LTO=thin ./private/msm-google/build_redbull-gki.sh

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la android-kernel/out/android-msm-pixel-4.19/dist/ 2>/dev/null || echo "dist not found, checking out/"
          find android-kernel/out/ -name "Image.lz4-dtb" 2>/dev/null
          find android-kernel/out/ -name "*.ko" 2>/dev/null | head -10
          find android-kernel/out/ -name "boot.img" 2>/dev/null

      - name: Setup AnyKernel3
        run: |
          cd android-kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          
          # Configure AnyKernel3 for Pixel 5
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
          
          # Copy kernel image
          cp out/android-msm-pixel-4.19/dist/Image.lz4-dtb AnyKernel3/
          
          # Copy kernel modules
          mkdir -p AnyKernel3/modules
          find out/android-msm-pixel-4.19/dist/ -name "*.ko" -exec cp {} AnyKernel3/modules/ \;
          
          # List modules
          echo "=== Modules to install ==="
          ls -la AnyKernel3/modules/ || echo "No modules found"
          
          cd AnyKernel3
          zip -r9 ../redfin-ksu-susfs-kernel.zip ./*
          
          echo "=== AnyKernel3 zip created ==="
          ls -la ../redfin-ksu-susfs-kernel.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: redfin-ksu-susfs-kernel
          path: android-kernel/redfin-ksu-susfs-kernel.zip

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/boot.img

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor_boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/vendor_boot.img

      - name: Upload dtbo.img
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/dtbo.img

      - name: Upload kernel modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: android-kernel/out/android-msm-pixel-4.19/dist/*.ko
          if-no-files-found: warn
