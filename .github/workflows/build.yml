name: build_kernel_ksu_susfs
on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  KERNEL_BRANCH: android-msm-redbull-4.19-android14-qpr1
  SUBLEVEL: "278"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git wget curl zip cpio bc bison build-essential flex libncurses-dev libssl-dev

      - name: Cache kernel source
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: android-kernel
          key: kernel-${{ env.KERNEL_BRANCH }}-v3
          restore-keys: |
            kernel-${{ env.KERNEL_BRANCH }}-

      - name: Sync kernel source
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
          repo sync -c --no-tags -j$(nproc)

      - name: Verify cached source
        if: steps.cache-kernel.outputs.cache-hit == 'true'
        run: |
          echo "=== Cache hit! Skipping repo sync ==="
          ls -la android-kernel/private/msm-google/Makefile 2>/dev/null || {
            echo "Cache invalid, re-syncing..."
            rm -rf android-kernel
            mkdir android-kernel && cd android-kernel
            repo init -u https://android.googlesource.com/kernel/manifest -b ${{ env.KERNEL_BRANCH }}
            repo sync -c --no-tags -j$(nproc)
          }

      - name: Modify SUBLEVEL and remove -dirty suffix
        run: |
          cd android-kernel/private/msm-google
          rm -rf out/ AnyKernel3/ KernelSU-Next/ drivers/kernelsu/
          git checkout -- . 2>/dev/null || true
          find . -name "*.rej" -delete 2>/dev/null || true
          find . -name "*.orig" -delete 2>/dev/null || true
          sed -i 's/SUBLEVEL = .*/SUBLEVEL = ${{ env.SUBLEVEL }}/' Makefile
          # Remove -dirty suffix from kernel version (clean /proc/version)
          echo 'KBUILD_VERSION_SUFFIX = ""' >> Makefile
          grep SUBLEVEL Makefile
          grep KBUILD_VERSION_SUFFIX Makefile

      - name: Setup KernelSU-Next with SUSFS (wshamroukh legacy-susfs branch)
        run: |
          cd android-kernel/private/msm-google
          KSU_REPO="https://github.com/wshamroukh/KernelSU-Next-SUSFS-kernelv4.19"
          KSU_BRANCH="legacy-susfs"
          git clone "$KSU_REPO" -b "$KSU_BRANCH" "KernelSU-Next" --depth=1
          ln -sf "$(realpath --relative-to=drivers "KernelSU-Next/kernel")" drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile
          grep -q 'source "drivers/kernelsu/Kconfig"' drivers/Kconfig || sed -i '/endmenu/i\source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          echo "=== KernelSU-Next + SUSFS setup complete ==="
          grep -c "KSU_SUSFS" drivers/kernelsu/Kconfig || echo "SUSFS not found in Kconfig!"

      - name: Disable kprobe in KernelSU-Next (force manual hook)
        run: |
          cd android-kernel/private/msm-google/KernelSU-Next/kernel
          find . -type f \( -name '*.c' -o -name '*.h' \) -exec sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +
          echo "=== kprobe disabled ==="

      - name: Apply SUSFS v2.2.0 complete patch (JackA1ltman NonGKI_Kernel_Build_2nd)
        shell: bash
        run: |
          cd android-kernel
          rm -rf NonGKI_Build
          git clone --depth=1 https://github.com/JackA1ltman/NonGKI_Kernel_Build_2nd.git -b mainline NonGKI_Build || true
          
          cd private/msm-google
          
          # Apply the complete SUSFS v2.2.0 patch (self-contained: susfs.c + susfs.h + susfs_def.h + all kernel hooks)
          # Remove any stale SUSFS files first (cache may have old versions)
          rm -f fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h
          cp ../../NonGKI_Build/Patches/Patch/susfs_patch_to_4.19.patch .
          patch -p1 --batch --no-backup-if-mismatch < susfs_patch_to_4.19.patch || true
          echo "=== SUSFS v2.2.0 patch applied ==="
          
          # Verify SUSFS files were created
          echo "=== Verify ==="
          ls -la fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h 2>&1
          grep "SUSFS_VERSION" include/linux/susfs.h || echo "WARNING: susfs.h missing!"
          grep "SUSFS_MAGIC" include/linux/susfs_def.h || echo "WARNING: susfs_def.h missing!"
          
          # Verify SUSFS files
          echo "=== SUSFS_VERSION ==="
          grep "SUSFS_VERSION" include/linux/susfs.h || echo "NOT in susfs.h!"
          echo "=== SUSFS_MAGIC ==="
          grep "SUSFS_MAGIC" include/linux/susfs_def.h || echo "NOT in susfs_def.h!"
          echo "=== susfs.c exists ==="
          ls -la fs/susfs.c || echo "susfs.c NOT found!"
          
          # Preemptive compat: fsnotify_add_inode_mark may not exist in 4.19
          bash ../../../patches/fsnotify_compat.sh

      - name: Apply manual hooks (JackA1ltman's normal_patches.sh + reboot.c)
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          cp ../../../patches/normal_patches.sh .
          chmod +x normal_patches.sh
          bash normal_patches.sh
          python3 ../../../patches/patch_reboot.py kernel/reboot.c
          echo "=== Manual hooks applied ==="
          grep -n 'ksu_handle' fs/exec.c | head -5
          grep -n 'ksu_handle' fs/open.c | head -5
          grep -n 'ksu_handle' fs/read_write.c | head -5
          grep -n 'ksu_handle' fs/stat.c | head -5
          grep -n 'ksu_handle_sys_reboot' kernel/reboot.c | head -3

      - name: Inject KSU + SUSFS config into defconfig and build.config
        shell: bash
        run: |
          cd android-kernel/private/msm-google
          
          # Method 1: Write config directly to defconfig (JackA1ltman's approach)
          DEFCONFIG="arch/arm64/configs/vendor/redbull_GKI.config"
          if [ -f "$DEFCONFIG" ]; then
            echo "" >> "$DEFCONFIG"
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$DEFCONFIG"
            echo "=== Config written to $DEFCONFIG ==="
          else
            echo "WARNING: $DEFCONFIG not found"
            find arch/arm64/configs -name "*redbull*" | head -5
          fi
          
          # Method 2: Also inject into build.config update_config (belt and suspenders)
          CONFIG_FILE="build.config.redbull.vintf"
          if [ -f "$CONFIG_FILE" ]; then
            python3 << 'PYEOF'
          with open('build.config.redbull.vintf', 'r') as f:
              content = f.read()
          inject = """
              ${KERNEL_DIR}/scripts/config --file ${OUT_DIR}/.config \\
              -e KSU -e KSU_MANUAL_HOOK -e KSU_SUSFS \\
              -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT -e KSU_SUSFS_SUS_KSTAT \\
              -e KSU_SUSFS_TRY_UMOUNT -e KSU_SUSFS_SPOOF_UNAME -e KSU_SUSFS_ENABLE_LOG \\
              -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \\
              -e KSU_SUSFS_OPEN_REDIRECT -e KSU_SUSFS_SUS_MAP
              (cd ${OUT_DIR} && \\
              make O=${OUT_DIR} CLANG_TRIPLE=${CLANG_TRIPLE} CROSS_COMPILE=${CROSS_COMPILE} "${TOOL_ARGS[@]}" ${MAKE_ARGS} olddefconfig)
          """
          content = content.replace('olddefconfig)\n}', 'olddefconfig)\n' + inject + '\n}')
          with open('build.config.redbull.vintf', 'w') as f:
              f.write(content)
          print("=== Config also injected into build.config ===")
          PYEOF
          fi

      - name: Patch KSU Kbuild to skip hook check during mrproper
        run: |
          cd android-kernel/private/msm-google
          KSU_KBUILD="drivers/kernelsu/Kbuild"
          if [ -f "$KSU_KBUILD" ]; then
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$KSU_KBUILD"
            echo "=== Patched Kbuild ==="
          else
            REAL_KBUILD=$(readlink -f "$KSU_KBUILD")
            sed -i 's/$(error -- KernelSU-Next: No hooks were defined, please integrate manual hooks in your kernel!)/$(warning -- KernelSU-Next: Hook check bypassed during clean)/g' "$REAL_KBUILD"
            echo "=== Patched real Kbuild ==="
          fi

      - name: Build kernel
        run: |
          cd android-kernel
          rm -rf out/ AnyKernel3/
          LTO=thin ./private/msm-google/build_redbull-gki.sh

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la android-kernel/out/android-msm-pixel-4.19/dist/ 2>/dev/null || echo "dist not found"
          find android-kernel/out/ -name "Image.lz4-dtb" 2>/dev/null
          find android-kernel/out/ -name "*.ko" 2>/dev/null | head -10
          find android-kernel/out/ -name "boot.img" 2>/dev/null

      - name: Setup AnyKernel3
        run: |
          cd android-kernel
          rm -rf AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
          sed -i 's/do.modules=0/do.modules=1/g' AnyKernel3/anykernel.sh
          sed -i 's/do.systemless=1/do.systemless=0/g' AnyKernel3/anykernel.sh
          cp out/android-msm-pixel-4.19/dist/Image.lz4-dtb AnyKernel3/
          mkdir -p AnyKernel3/modules/lib/modules
          find out/android-msm-pixel-4.19/dist/ -name "*.ko" -exec cp {} AnyKernel3/modules/lib/modules/ \;
          cp out/android-msm-pixel-4.19/dist/modules.load AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.dep AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/modules.alias AnyKernel3/modules/lib/modules/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/vendor_boot.img AnyKernel3/ 2>/dev/null || true
          cp out/android-msm-pixel-4.19/dist/dtbo.img AnyKernel3/ 2>/dev/null || true
          echo "=== Modules ==="
          find AnyKernel3/modules/ -name "*.ko" | wc -l
          cd AnyKernel3
          zip -r9 ../redfin-ksu-susfs-kernel.zip ./*
          echo "=== AnyKernel3 zip created ==="
          ls -la ../redfin-ksu-susfs-kernel.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: redfin-ksu-susfs-kernel
          path: android-kernel/redfin-ksu-susfs-kernel.zip

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/boot.img

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: vendor_boot.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/vendor_boot.img

      - name: Upload dtbo.img
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img
          path: android-kernel/out/android-msm-pixel-4.19/dist/dtbo.img

      - name: Upload kernel modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: android-kernel/out/android-msm-pixel-4.19/dist/*.ko
          if-no-files-found: warn
